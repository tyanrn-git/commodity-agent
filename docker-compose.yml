services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commodity
      POSTGRES_PASSWORD: commodity
      POSTGRES_DB: commodity_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commodity -d commodity_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-change-in-production
      DATABASE_URL: postgresql://commodity:commodity@db:5432/commodity_agent
      STORAGE_PATH: /app/data/storage
      CORS_ORIGINS: http://localhost:3000
      ADMIN_EMAIL: admin@localhost
      ADMIN_PASSWORD: changeme
      COOKIE_SECURE: "false"
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      OPENAI_FALLBACK_MODEL: ${OPENAI_FALLBACK_MODEL:-gpt-4o}
      TENDER_PROMOTION_MODE: ${TENDER_PROMOTION_MODE:-legacy}
      AUTO_QUALIFY_SCORE_THRESHOLD: ${AUTO_QUALIFY_SCORE_THRESHOLD:-0.65}
    volumes:
      - ./backend:/app
      - storage_data:/app/data/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  storage_data:
