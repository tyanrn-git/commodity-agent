name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: commodity
          POSTGRES_PASSWORD: commodity
          POSTGRES_DB: commodity_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commodity -d commodity_agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://commodity:commodity@localhost:5432/commodity_agent_test
          ADMIN_EMAIL: admin@localhost
          ADMIN_PASSWORD: changeme
          STORAGE_PATH: /tmp/commodity-storage
        run: pytest -q
